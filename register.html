<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | GenAI System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #fce7f3);
            min-height: 100vh;
        }

        .register-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            animation: fadeSlide 1.2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .register-image img {
            max-width: 100%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 12px;
            background: linear-gradient(135deg, #38bdf8, #f472b6);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        a {
            color: #6366f1;
            font-weight: 500;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="register-card row align-items-center g-4">

        <!-- Image -->
        <div class="col-md-6 register-image text-center">
            <img src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485"
                 alt="Register Illustration">
        </div>

        <!-- Form -->
        <div class="col-md-6">
            <h3 class="mb-4 fw-semibold">Create Your Account</h3>
            {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">University</label>
                    <input type="text" class="form-control" name="university" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">
                    Register
                </button>
            </form>

            <p class="mt-3 text-center">
                Already have an account?
                <a href="/login">Login</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => {
        const alert = document.querySelector('.alert');
        if (alert) {
            alert.classList.remove('show');
            alert.classList.add('fade');
        }
    }, 7000);
</script>

</body>
</html>
