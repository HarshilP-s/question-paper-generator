<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Answer Key</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13pt;
      margin: 40px;
      background: #fffaf7; /* soft peach background */
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #5a3e85; /* pastel purple */
    }
    .question {
      margin-bottom: 20px;
      padding: 15px;
      background: #f6f0fa; /* light purple card */
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .question b {
      color: #d88c9a; /* pastel peach for Q. No */
    }
    .question-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #444;
    }
    .answer {
      margin-left: 15px;
      line-height: 1.6;
      color: #333;
    }
    .marks {
      font-size: 12pt;
      font-weight: bold;
      color: #5a3e85;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<h2>Answer Key</h2>

{% for item in answers %}
<div class="question">
  <div class="question-title">
    <b>{{ item.q_no }}:</b> {{ item.question }}
    <span class="marks">({{ item.marks }} Marks)</span>
  </div>
  <div class="answer">
    {{ item.answer | safe }}
  </div>
</div>
{% endfor %}

</body>
</html>
