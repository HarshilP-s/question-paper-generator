<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | GenAI System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f0ff, #fdf1ff);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #c7d2fe, #fbcfe8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 1s ease forwards;
            animation-delay: 2.5s;
        }

        #splash h1 {
            font-weight: 600;
            font-size: 2.2rem;
            color: #1f2937;
            animation: pop 1.2s ease infinite alternate;
            text-align: center;
        }

        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Login Card */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            animation: fadeSlide 1.2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .login-image img {
            max-width: 100%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        a {
            color: #6366f1;
            font-weight: 500;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
    <h1>🤖 Generative AI System <br>
            TEXT-To-TEST
    </h1>
</div>

<!-- Login -->
<div class="login-wrapper">
    <div class="login-card row align-items-center g-4">

        <!-- Image -->
        <div class="col-md-6 login-image text-center">
            <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995"
                 alt="AI Illustration">
        </div>

        <!-- Form -->
        <div class="col-md-6">
            <h3 class="mb-4 fw-semibold">Welcome Back</h3>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">
                    Login
                </button>
            </form>

            <p class="mt-3 text-center">
                Don’t have an account?
                <a href="{{ url_for('register') }}">Register here</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
