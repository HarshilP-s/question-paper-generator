<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
display:flex;
justify-content:center;
padding:40px;
}

/* profile card */

.profile-card{
width:520px;
background:white;
border-radius:16px;
padding:35px;
box-shadow:0 10px 35px rgba(0,0,0,0.1);
animation:fadeIn 0.8s ease;
}

/* title */

.profile-card h1{
text-align:center;
margin-bottom:25px;
color:#4c3c74;
}

/* avatar */

.logo-preview{
width:130px;
height:130px;
border-radius:50%;
background:linear-gradient(135deg,#6a85b6,#bac8e0);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
color:white;
margin:auto;
margin-bottom:25px;
cursor:pointer;
transition:0.3s;
animation:float 4s ease-in-out infinite;
}

.logo-preview:hover{
transform:scale(1.08);
}

.logo-preview img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

/* labels */

label{
font-weight:600;
color:#555;
}

/* inputs */

input,select,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
margin-bottom:15px;
transition:0.3s;
}

input:focus,select:focus,textarea:focus{
border-color:#6a85b6;
box-shadow:0 0 5px rgba(106,133,182,0.4);
outline:none;
}

/* save button */

button{
width:100%;
background:linear-gradient(135deg,#5a8dee,#3c6ee6);
color:white;
padding:13px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

/* animations */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}

</style>

</head>

<body>

<div class="profile-card">

<h1>👤 My Profile</h1>

<div class="logo-preview">

<label for="logoUpload">

{% if user.logo %}
<img src="{{ url_for('static', filename='uploads/' + user.logo) }}">
{% else %}
<span>{{ user.name[0] }}</span>
{% endif %}

</label>

<input type="file" id="logoUpload" name="logo" hidden>

</div>

<form method="POST" enctype="multipart/form-data">

{% if user %}
<p><b>Name:</b> {{ user.name }}</p>
<p><b>Email:</b> {{ user.email }}</p>
{% else %}
<p>User data not found</p>
{% endif %}
<label>📞 Phone Number</label>
<input type="text" name="phone" value="{{ user.phone or '' }}">

<label>📘Subject / Specialization</label>
<input type="text" name="subject" value="{{ user.subject or '' }}">

<label>🏫 Institution / University</label>
<input type="text" name="institution" value="{{ user.institution or '' }}">

<label>🎓 Qualification</label>
<input type="text" name="education" value="{{ user.education or '' }}">

<label>👨‍🏫Teaching Experience (Years)</label>
<input type="number" name="experience" value="{{ user.experience or '' }}">

<label>📝Preferred Question Style</label>
<select name="preferred_style">
<option value="MIXED" {% if user.preferred_style == 'MIXED' %}selected{% endif %}>Mixed</option>
<option value="SHORT" {% if user.preferred_style == 'SHORT' %}selected{% endif %}>Short Answer</option>
<option value="LONG" {% if user.preferred_style == 'LONG' %}selected{% endif %}>Long Answer</option>
<option value="MCQ" {% if user.preferred_style == 'MCQ' %}selected{% endif %}>MCQ</option>
</select>

<label>⚡Difficulty Level</label>
<select name="difficulty">
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>
</select>

<label>💬About Teacher</label>
<textarea name="bio">{{ user.bio or '' }}</textarea>

<button type="submit">💾 Save Profile</button>

</form>

</div>

</body>
</html>
